        function isColumnarFormat(csvText) {
            // Detect visual column-padding format: spaces deliberately placed around semicolons.
            // Leading structural indentation (e.g. "    User;...") must NOT be treated as columnar.
            const lines = csvText.split('\n').filter(l => l.trim() && !l.trim().startsWith('#'));
            if (lines.length === 0) return false;

            // Look for space-padded field separators: " ; " (space-semicolon-space)
            return lines.some(line => / ; /.test(line));
        }

        function condenseCsv(csvText) {
            // Convert from columnar to condensed format - remove extra spaces
            return csvText.split('\n').map(line => {
                // For comment lines, keep as-is
                if (line.trimStart().startsWith('#')) {
                    return line;
                }
                const match = line.match(/^(\s*)(.*)$/);
                const leading = match ? match[1] : '';
                const content = match ? match[2] : line;

                if (!content.trim()) {
                    return '';
                }
                // Drop extraneous header rows
                if (isTypeNameDescriptionHeader(content.trim())) {
                    return null;
                }
                // Split by semicolon (quote-aware), trim each field, and rejoin.
                return leading + joinCsvFields(parseSemicolonFields(content), ';');
            }).filter(l => l !== null).join('\n');
        }

        function parseSemicolonFields(content) {
            const fields = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < content.length; i++) {
                const ch = content[i];
                if (ch === '"') {
                    if (inQuotes && i + 1 < content.length && content[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                    continue;
                }
                if (ch === ';' && !inQuotes) {
                    fields.push(current.trim());
                    current = '';
                    continue;
                }
                current += ch;
            }

            fields.push(current.trim());
            if (fields.length > 0) {
                fields[0] = fields[0].replace(/^\uFEFF+/, '');
            }
            return fields;
        }

        function encodeCsvField(value) {
            const text = String(value ?? '');
            if (/[;"\r\n]/.test(text)) {
                return `"${text.replace(/"/g, '""')}"`;
            }
            return text;
        }

        function joinCsvFields(fields, separator) {
            return fields.map(encodeCsvField).join(separator);
        }

        function serializedFieldWidth(field) {
            return encodeCsvField(field).length;
        }

        function isTypeNameDescriptionHeader(line) {
            const fields = parseSemicolonFields(line).map(f => f.toLowerCase());
            return fields.length >= 3 &&
                fields[0] === 'type' &&
                fields[1] === 'name' &&
                fields[2] === 'description';
        }

        function getFieldCount(line) {
            return parseSemicolonFields(line.trimStart()).length;
        }

        function getTypeName(line) {
            const fields = parseSemicolonFields(line.trimStart());
            return fields.length > 0 ? fields[0].trim() : '';
        }

        function isIndentedRow(line) {
            return /^\s+/.test(line);
        }

        function isNoteToken(value) {
            return /^@\w+/.test((value || '').trim());
        }

        function classifySequenceRow(fields) {
            return (fields.length > 1 && isNoteToken(fields[1])) ? 'note' : 'step';
        }

        function formatSequenceRows(groupLines) {
            const widthsByKind = {};
            const parsed = [];

            groupLines.forEach(line => {
                const match = line.match(/^(\s*)(.*)$/);
                const leading = match ? match[1] : '';
                const content = match ? match[2] : line;
                const fields = parseSemicolonFields(content);
                const kind = classifySequenceRow(fields);
                if (!widthsByKind[kind]) {
                    widthsByKind[kind] = { text: [], note: [] };
                }
                const widths = widthsByKind[kind];

                fields.forEach((field, idx) => {
                    if (idx === fields.length - 1) return;
                    const bucket = isNoteToken(field) ? widths.note : widths.text;
                    if (!bucket[idx]) bucket[idx] = 0;
                    bucket[idx] = Math.max(bucket[idx], serializedFieldWidth(field));
                });

                parsed.push({ leading, fields, kind });
            });

            return parsed.map(({ leading, fields, kind }) => {
                const widths = widthsByKind[kind] || { text: [], note: [] };
                const formatted = fields.map((field, idx) => {
                    const serialized = encodeCsvField(field);
                    if (idx === fields.length - 1) return serialized;
                    const bucket = isNoteToken(field) ? widths.note : widths.text;
                    const width = bucket[idx] || serialized.length;
                    return serialized.padEnd(width);
                });
                return leading + formatted.join(' ; ');
            });
        }

        function isNoteTypeField(field) {
            return ['@Info', '@Warning', '@Error', '@Success'].includes(field);
        }

        function toCondensedLine(line) {
            const match = line.match(/^(\s*)(.*)$/);
            const leading = match ? match[1] : '';
            const content = match ? match[2] : line;
            return leading + joinCsvFields(parseSemicolonFields(content), ';');
        }

        function normalizeDelimitedLine(line) {
            const match = line.match(/^(\s*)(.*)$/);
            const leading = match ? match[1] : '';
            const content = match ? match[2] : line;
            const trimmed = content.trim();
            if (!trimmed || trimmed.startsWith('#')) {
                return line;
            }
            if (content.includes(';') || !content.includes(',')) {
                return line;
            }
            return leading + content.split(',').map(part => part.trim()).join(';');
        }

        function normalizeCsvSeparators(csvText) {
            return csvText.split('\n').map(normalizeDelimitedLine).join('\n');
        }

        function formatCsvColumnar(csvText) {
            // Convert from condensed to columnar format with aligned columns
            // Respects hierarchy: each group (header + rows) formatted independently
            const lines = csvText.split('\n');
            const result = [];
            let i = 0;
            let currentTopLevelType = '';
            
            while (i < lines.length) {
                const line = lines[i];
                if (!isIndentedRow(line) && line.trim() && !line.trim().startsWith('#')) {
                    currentTopLevelType = getTypeName(line);
                }
                
                // Pass through comments and empty lines
                if (line.trim().startsWith('#') || !line.trim()) {
                    result.push(line);
                    i++;
                    continue;
                }
                
                // Drop extraneous header rows
                if (isTypeNameDescriptionHeader(line.trim())) {
                    i++;
                    continue;
                }

                // In Sequence blocks, align mixed row shapes together so source/target/function
                // columns remain visually consistent across the whole sequence.
                if (currentTopLevelType === 'Sequence' && isIndentedRow(line)) {
                    const sequenceRows = [];
                    while (i < lines.length) {
                        const candidate = lines[i];
                        const candidateTrimmed = candidate.trim();
                        if (!candidateTrimmed || candidateTrimmed.startsWith('#')) {
                            break;
                        }
                        if (!isIndentedRow(candidate) || isTypeNameDescriptionHeader(candidateTrimmed)) {
                            break;
                        }
                        sequenceRows.push(candidate);
                        i++;
                    }
                    result.push(...formatSequenceRows(sequenceRows));
                    continue;
                }

                // Group contiguous rows with the same field count so connector arrow columns
                // are never padded based on longer description rows from a different row shape.
                const group = [line];
                const fieldCount = getFieldCount(line);
                i++;

                while (i < lines.length) {
                    const nextLine = lines[i];
                    const nextTrimmed = nextLine.trim();
                    if (nextTrimmed.startsWith('#') || !nextTrimmed) {
                        break;
                    }
                    if (isTypeNameDescriptionHeader(nextTrimmed)) {
                        i++; // skip header mid-block
                        continue;
                    }
                    if (getFieldCount(nextLine) !== fieldCount) {
                        break;
                    }
                    group.push(nextLine);
                    i++;
                }

                const keepTableFormat = getTypeName(group[0]) === 'ClassDiagram';

                // Keep single-row items condensed except ClassDiagram rows and
                // sequence-step rows, which should retain table-style separators.
                if (group.length === 1 && !keepTableFormat) {
                    result.push(toCondensedLine(group[0]));
                } else {
                    result.push(...formatGroupWithIndentation(group));
                }
            }
            
            return result.join('\n');
        }
        
        function formatGroupWithIndentation(groupLines) {
            // Calculate column widths using trimmed field content.
            // Leading structural indentation (e.g. 4 spaces on connector rows) is preserved as-is.
            const columnWidths = [];
            const parsedLines = [];

            groupLines.forEach(line => {
                const match = line.match(/^(\s*)(.*)$/);
                const leading = match ? match[1] : '';
                const content = match ? match[2] : line;
                const fields = parseSemicolonFields(content);
                parsedLines.push({ leading, fields });

                fields.forEach((field, idx) => {
                    if (!columnWidths[idx]) columnWidths[idx] = 0;
                    columnWidths[idx] = Math.max(columnWidths[idx], serializedFieldWidth(field));
                });
            });

            return parsedLines.map(({ leading, fields }) => {
                const formatted = fields.map((field, fieldIdx) => {
                    const serialized = encodeCsvField(field);
                    if (fieldIdx === fields.length - 1 || isNoteTypeField(field)) return serialized;
                    return serialized.padEnd(columnWidths[fieldIdx] || 0);
                });
                return leading + formatted.join(' ; ');
            });
        }

        function toggleCsvFormat() {
            const currentText = normalizeCsvSeparators(csvEditorTextarea.value);
            
            // Determine current format and toggle
            let newText;
            if (isColumnarFormat(currentText)) {
                // Currently columnar, convert to condensed
                newText = condenseCsv(currentText);
            } else {
                // Currently condensed, convert to columnar
                newText = formatCsvColumnar(currentText);
            }
            
            const changed = newText !== currentText;
            
            csvEditorTextarea.value = newText;
            csvEditorTextarea.dispatchEvent(new Event('input', { bubbles: true }));
            highlightCsvSyntax(newText);
            if (!changed) {
                setEditorStatus('Already formatted');
            }
        }

        async function saveCsvEditorText() {
            if (!state.csv || state.editorSaving || !state.editorDirty) {
                return;
            }

            state.editorSaving = true;
            updateEditorSaveButtonState();
            setEditorStatus('Saving...', '');
            const previousDiagramMarkup = diagramContainer ? diagramContainer.innerHTML : '';

            try {
                const payload = {
                    csv: state.csv,
                    content: csvEditorTextarea.value
                };

                const response = await fetch('/api/csv_text', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (!response.ok || !data.ok) {
                    throw new Error(data.error || 'Save failed');
                }

                state.editorOriginalText = csvEditorTextarea.value;
                state.editorDirty = false;
                updateEditorSaveButtonState();
                await loadDiagram();
                const currentDiagramMarkup = diagramContainer ? diagramContainer.innerHTML : '';
                if (previousDiagramMarkup && currentDiagramMarkup && previousDiagramMarkup === currentDiagramMarkup) {
                    setEditorStatus('Saved (selected diagram unchanged)');
                } else {
                    setEditorStatus('Saved');
                }
            } catch (error) {
                setEditorStatus(`Error: ${error.message}`, 'error');
                updateEditorSaveButtonState();
            } finally {
                state.editorSaving = false;
                updateEditorSaveButtonState();
            }
        }

        function canSwitchDiagram(targetDiagram) {
            if (!targetDiagram) {
                return true;
            }

            const currentKey = getCurrentDiagramKey();
            const targetKey = getDiagramKeyFor(targetDiagram);
            if (!currentKey || !targetKey || currentKey === targetKey) {
                return true;
            }

            if (state.editorDirty) {
                const confirmed = window.confirm('You have unsaved changes. Discard and switch diagram?');
                if (confirmed) {
                    csvEditorTextarea.value = state.editorOriginalText;
                    state.editorDirty = false;
                    setEditorStatus('Saved');
                    updateEditorSaveButtonState();
                }
                return confirmed;
            }
            return true;
        }
        
        // Copy to clipboard functionality
        function showToast(message, duration = 2000) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }
        
        async function copySelectedText() {
            const selection = window.getSelection();
            
            if (selection.toString().length === 0) {
                showToast('No text selected', 1500);
                return;
            }
            
            try {
                await navigator.clipboard.writeText(selection.toString());
                showToast('Copied to clipboard!', 2000);
            } catch (err) {
                showToast('Failed to copy', 1500);
                console.error('Copy failed:', err);
            }
        }
        
        // Handle Ctrl+C for copying selected text
        document.addEventListener('keydown', (event) => {
            if (event.ctrlKey && event.key === 'c') {
                const selection = window.getSelection();
                // Only handle Ctrl+C if something in the diagram is selected
                if (selection.toString().length > 0 && 
                    diagramContainer.contains(selection.anchorNode)) {
                    event.preventDefault();
                    copySelectedText();
                }
            }
        });
        
        // Handle copy event for selected text
        document.addEventListener('copy', (event) => {
            const selection = window.getSelection();
            if (selection.toString().length > 0 && 
                diagramContainer && diagramContainer.contains(selection.anchorNode)) {
                // Allow native copy to work, but show toast
                showToast('Copied to clipboard!', 2000);
            }
        });
        
        // Handle note box clicks - copy note content to clipboard
        document.addEventListener('click', async (event) => {
            // Check if clicked element or its parent is a note box group
            let noteGroup = event.target.closest('.note-box-group');
            if (noteGroup && noteGroup.hasAttribute('data-note-content')) {
                const noteContent = noteGroup.getAttribute('data-note-content');
                try {
                    await navigator.clipboard.writeText(noteContent);
                    showToast('Note copied to clipboard!', 2000);
                    event.stopPropagation();
                } catch (err) {
                    showToast('Failed to copy note', 1500);
                    console.error('Copy failed:', err);
                }
            }
        }, true); // Use capture phase to intercept early
        
        // Initialize
        async function init() {
            try {
                console.log('Initializing diagram viewer...');

                const startupParams = window.initialParams || {};
                const startupCsv = String(startupParams.csv || '').trim();
                const startupSequence = String(startupParams.sequence || '').trim();

                // Restore showTestDiagrams from persisted state before the first catalog
                // fetch so test diagrams are included when the user previously enabled them.
                const earlyPersisted = loadPersistedViewerState();
                if (earlyPersisted && typeof earlyPersisted.showTestDiagrams === 'boolean') {
                    state.showTestDiagrams = earlyPersisted.showTestDiagrams;
                }
                if (earlyPersisted && typeof earlyPersisted.showIncludeCsvFiles === 'boolean') {
                    state.showIncludeCsvFiles = earlyPersisted.showIncludeCsvFiles;
                }
                if (earlyPersisted && typeof earlyPersisted.editorVisible === 'boolean') {
                    state.editorVisible = earlyPersisted.editorVisible;
                }
                if (earlyPersisted && typeof earlyPersisted.editorPaneWidth === 'number' && earlyPersisted.editorPaneWidth > 0) {
                    state.editorPaneWidth = earlyPersisted.editorPaneWidth;
                }
                if (earlyPersisted && typeof earlyPersisted.editorZoomLevel === 'number' && earlyPersisted.editorZoomLevel > 0) {
                    state.editorZoomLevel = earlyPersisted.editorZoomLevel;
                }
                showTestDiagramsToggle.checked = state.showTestDiagrams;
                if (showIncludeCsvToggle) {
                    showIncludeCsvToggle.checked = state.showIncludeCsvFiles;
                }
                if (showEditorToggle) {
                    showEditorToggle.checked = state.editorVisible;
                }
                applyEditorPaneWidth();
                applyEditorVisibility();
                updateEditorTitle();
                setEditorStatus('Saved');
                applyEditorZoom();
                
                // Check URL parameters for diagram override
                const urlParams = new URLSearchParams(window.location.search);
                const diagramParam = urlParams.get('diagram');
                // Treat only explicit URL query parameters as external overrides.
                // Server-injected initialParams always contain defaults, which
                // should not block persisted state restore.
                const hasExternalSelectionOverride =
                    urlParams.has('diagram') || urlParams.has('csv') || urlParams.has('sequence');
                
                // Check if initial parameters were provided via window.initialParams
                if (window.initialParams) {
                    // Always allow externally provided verbosity.
                    state.verbosity = startupParams.verbosity || state.verbosity;
                    state.csv = startupCsv || state.csv;
                    state.sequence = startupSequence || state.sequence;
                } else if (diagramParam) {
                    let csvPath = diagramParam;
                    if (csvPath.includes('/')) {
                        csvPath = csvPath.substring(csvPath.lastIndexOf('/') + 1);
                    }
                    state.csv = csvPath;
                }
                
                // Fetch all diagrams from all CSVs
                await refreshDiagramCatalog();
                if (state.allDiagrams.length === 0) {
                    diagramArea.innerHTML = '<div class="error">No diagrams found</div>';
                    return;
                }
                
                // Type filtering removed; all diagrams shown with type badges
                
                // Set up command palette
                setupPalette();
                
                // Populate verbosity options (once)
                const levels = ["Low", "Normal", "High"];
                levels.forEach(level => {
                    const div = document.createElement('div');
                    div.className = 'radio-option';
                    div.innerHTML = `
                        <input type="radio" id="verb_${level}" name="verbosity" value="${level}" 
                               ${level === state.verbosity ? 'checked' : ''}>
                        <label for="verb_${level}">${level}</label>
                    `;
                    div.querySelector('input').addEventListener('change', onVerbosityChange);
                    verbosityOptions.appendChild(div);
                });
                
                // Populate routing options (once)
                const routingModes = ["orthogonal"];
                const routingLabels = {
                    "orthogonal": "Right Angles (Temporary Default)"
                };
                routingModes.forEach(mode => {
                    const div = document.createElement('div');
                    div.className = 'radio-option';
                    div.innerHTML = `
                        <input type="radio" id="rout_${mode}" name="routing" value="${mode}" 
                               ${mode === state.routing ? 'checked' : ''}>
                        <label for="rout_${mode}">${routingLabels[mode]}</label>
                    `;
                    div.querySelector('input').addEventListener('change', onRoutingChange);
                    routingOptions.appendChild(div);
                });

                // Restore prior session only when no explicit external diagram
                // override was provided.
                if (!hasExternalSelectionOverride && restorePersistedSelection()) {
                    updateMenuVisibility();
                    syncMenuControlsFromState();
                    updateLaneCheckboxes();
                    await loadDiagram();
                    return;
                }

                const startupDiagram = (() => {
                    const normalizeCsvPath = (value) => String(value || '').trim().replace(/\\/g, '/');
                    const startupCsvNormalized = normalizeCsvPath(startupCsv);
                    const startupCsvBase = startupCsvNormalized.includes('/')
                        ? startupCsvNormalized.split('/').pop()
                        : startupCsvNormalized;

                    const csvMatchesStartup = (diagramCsv) => {
                        const diagramCsvNormalized = normalizeCsvPath(diagramCsv);
                        if (!startupCsvNormalized) {
                            return false;
                        }
                        if (diagramCsvNormalized === startupCsvNormalized) {
                            return true;
                        }
                        const diagramCsvBase = diagramCsvNormalized.includes('/')
                            ? diagramCsvNormalized.split('/').pop()
                            : diagramCsvNormalized;
                        return diagramCsvBase === startupCsvBase;
                    };

                    if (startupCsvNormalized && startupSequence) {
                        return state.allDiagrams.find(diagram =>
                            csvMatchesStartup(diagram.csv) &&
                            diagram.type === 'sequence' &&
                            diagram.id === startupSequence
                        ) || null;
                    }

                    if (startupCsvNormalized) {
                        // Prefer a renderable diagram from the requested CSV, but if none exists
                        // (requirements/spec tables), still select the CSV entry so editor actions
                        // like Format apply to the requested file.
                        const csvRenderableMatch = state.allDiagrams.find(diagram =>
                            csvMatchesStartup(diagram.csv) &&
                            (diagram.type === 'sequence' || diagram.type === 'class_diagram')
                        );
                        if (csvRenderableMatch) {
                            return csvRenderableMatch;
                        }

                        const csvAnyMatch = state.allDiagrams.find(diagram => csvMatchesStartup(diagram.csv));
                        if (csvAnyMatch) {
                            return csvAnyMatch;
                        }
                    }

                    return state.allDiagrams.find(diagram =>
                        diagram.type === 'sequence' || diagram.type === 'class_diagram'
                    ) || null;
                })();

                if (startupDiagram) {
                    state.applyFitOnLoad = true;
                    applyDiagramSelection(startupDiagram);
                    updateMenuVisibility();
                    syncMenuControlsFromState();
                    updateLaneCheckboxes();
                    await loadDiagram();
                    return;
                }
                
                // Show prompt to select a diagram
                diagramContainer.innerHTML = '<div style="color: #999; font-size: 16px;">Select a diagram from the palette above</div>';
            } catch (error) {
                console.error('Initialization error:', error);
                diagramArea.innerHTML = `<div class="error">Error loading configuration: ${error.message}</div>`;
            }
        }
        
        
        function setupPalette() {
            state.paletteActiveIndex = -1;
            
            paletteInput.addEventListener('focus', () => {
                state.paletteActiveIndex = -1;
                // Show the full catalog on focus even when the input currently
                // displays the selected diagram label.
                populatePalette('');
                paletteDropdown.classList.add('open');
                paletteInput.select();
            });
            
            paletteInput.addEventListener('input', () => {
                state.paletteActiveIndex = -1;
                populatePalette();
                paletteDropdown.classList.add('open');
            });
            
            paletteInput.addEventListener('keydown', (e) => {
                const items = paletteDropdown.querySelectorAll('.palette-item');
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    state.paletteActiveIndex = Math.min(state.paletteActiveIndex + 1, items.length - 1);
                    updatePaletteHighlight(items);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    state.paletteActiveIndex = Math.max(state.paletteActiveIndex - 1, 0);
                    updatePaletteHighlight(items);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (state.paletteActiveIndex >= 0 && items[state.paletteActiveIndex]) {
                        items[state.paletteActiveIndex].click();
                    } else if (items.length > 0) {
                        items[0].click();
                    }
                } else if (e.key === 'Escape') {
                    paletteDropdown.classList.remove('open');
                    paletteInput.blur();
                }
            });
            
            // Close dropdown when clicking outside
            document.addEventListener('mousedown', (e) => {
                if (!paletteWrapper.contains(e.target)) {
                    paletteDropdown.classList.remove('open');
                }
            });
        }

        function buildAllDiagramsUrl() {
            const params = new URLSearchParams();
            if (state.showTestDiagrams) {
                params.set('include_test', '1');
            }
            const query = params.toString();
            return query ? `/api/all_diagrams?${query}` : '/api/all_diagrams';
        }

        async function refreshDiagramCatalog() {
            const [diagramsResponse, csvsResponse] = await Promise.all([
                fetch(buildAllDiagramsUrl()),
                fetch('/api/csvs')
            ]);

            if (!diagramsResponse.ok) {
                throw new Error(`Failed to load diagrams: ${diagramsResponse.statusText}`);
            }
            if (!csvsResponse.ok) {
                throw new Error(`Failed to load CSV catalog: ${csvsResponse.statusText}`);
            }

            const diagramsData = await diagramsResponse.json();
            const csvsData = await csvsResponse.json();
            const diagrams = diagramsData.diagrams || [];
            const allCsvs = csvsData.csvs || [];

            const isTestCsvEntry = (entry) => {
                const hierarchy = Array.isArray(entry.hierarchy) ? entry.hierarchy : [];
                const csvKey = String(entry.id || '').replace(/\\/g, '/').toLowerCase();
                return (
                    (hierarchy.length > 0 && hierarchy[0] === 'Test') ||
                    csvKey.startsWith('test/tests/') ||
                    csvKey.includes('/40_tests/')
                );
            };

            const visibleCsvs = state.showTestDiagrams
                ? allCsvs
                : allCsvs.filter(entry => !isTestCsvEntry(entry));

            const csvsWithDiagrams = new Set(diagrams.map(diagram => diagram.csv));
            const csvOnlyEntries = visibleCsvs
                .filter(entry => !csvsWithDiagrams.has(entry.id))
                .map(entry => ({
                    type: 'csv_only',
                    id: entry.id,
                    name: `CSV: ${entry.id}`,
                    csv: entry.id,
                    hierarchy: Array.isArray(entry.hierarchy) ? entry.hierarchy : [],
                    symbols: [],
                    lanes: [],
                    layers: []
                }));

            state.allDiagrams = state.showIncludeCsvFiles
                ? diagrams.concat(csvOnlyEntries)
                : diagrams;
        }
        
        function updatePaletteHighlight(items) {
            items.forEach((item, i) => {
                item.classList.toggle('active', i === state.paletteActiveIndex);
            });
            // Scroll active item into view
            if (state.paletteActiveIndex >= 0 && items[state.paletteActiveIndex]) {
                items[state.paletteActiveIndex].scrollIntoView({ block: 'nearest' });
            }
        }
        
        function populatePalette(filterOverride = null) {
            const textFilter = (filterOverride !== null)
                ? String(filterOverride).toLowerCase().trim()
                : paletteInput.value.toLowerCase().trim();
            paletteDropdown.innerHTML = '';
            
            // Filter all diagrams by text
            const matches = state.allDiagrams.filter(d =>
                !textFilter || d.name.toLowerCase().includes(textFilter) || d.id.toLowerCase().includes(textFilter)
            );
            
            if (matches.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'palette-empty';
                empty.textContent = 'No diagrams match filter';
                paletteDropdown.appendChild(empty);
                return;
            }
            
            // Build a tree structure from hierarchy
            const tree = {};
            
            matches.forEach(diagram => {
                const hierarchy = diagram.hierarchy || [];
                let node = tree;
                
                // Navigate/create tree nodes for each level
                hierarchy.forEach(folderName => {
                    if (!node[folderName]) {
                        node[folderName] = {};
                    }
                    node = node[folderName];
                });
                
                // Store diagrams in _diagrams array at leaf level
                if (!node._diagrams) {
                    node._diagrams = [];
                }
                node._diagrams.push(diagram);
            });
            
            // Helper to format folder names: remove numeric sorting prefix only
            // The hierarchy should match the actual folder structure exactly
            function formatFolderName(name) {
                // Remove leading numeric prefix for sorting (e.g., "01_", "40_") only
                return name.replace(/^\d+_/, '');
            }
            
            // Helper to extract numeric prefix for sorting
            function extractNumericPrefix(name) {
                const match = name.match(/^(\d+)/);
                return match ? parseInt(match[1]) : 9999; // Non-prefixed items go last
            }
            
            // Custom sort for folder keys: maintains numeric prefix order
            function sortFolderKeys(keys) {
                return keys.sort((a, b) => {
                    // Extract numeric prefixes
                    const prefixA = extractNumericPrefix(a);
                    const prefixB = extractNumericPrefix(b);
                    
                    // Compare by numeric prefix first
                    if (prefixA !== prefixB) {
                        return prefixA - prefixB;
                    }
                    
                    // If same prefix, sort alphabetically by the rest of the name
                    return a.localeCompare(b);
                });
            }
            
            // Render the tree recursively
            function renderTree(treeNode, depth = 0) {
                // First, render any diagrams at this level (before folders)
                if (treeNode._diagrams) {
                    const sortedDiagrams = treeNode._diagrams.sort((a, b) => {
                        const typeOrder = {
                            class_diagram: 0,
                            sequence: 1,
                            csv_only: 2
                        };
                        const orderA = Object.prototype.hasOwnProperty.call(typeOrder, a.type) ? typeOrder[a.type] : 99;
                        const orderB = Object.prototype.hasOwnProperty.call(typeOrder, b.type) ? typeOrder[b.type] : 99;
                        if (orderA !== orderB) {
                            return orderA - orderB;
                        }
                        return a.name.localeCompare(b.name);
                    });
                    
                    sortedDiagrams.forEach(d => {
                        const item = document.createElement('div');
                        item.className = 'palette-item';
                        const typePrefix = d.type === 'sequence' ? 'seq' : (d.type === 'class_diagram' ? 'cd' : 'csv');
                        item.dataset.value = typePrefix + ':' + d.csv + ':' + d.id;
                        item.style.paddingLeft = (depth * 16) + 'px';
                        
                        const typeLabel = d.type === 'sequence' ? 'SEQ' : (d.type === 'class_diagram' ? 'CLS' : 'CSV');
                        item.innerHTML = `<span class="item-type">${typeLabel}</span> ${escapeHtml(d.name)}`;
                        const onSelect = (e) => {
                            e.preventDefault();
                            selectPaletteItem(d);
                        };
                        item.addEventListener('mousedown', onSelect);
                        item.addEventListener('click', onSelect);
                        paletteDropdown.appendChild(item);
                    });
                }
                
                // Then render folders and their contents
                const keys = sortFolderKeys(Object.keys(treeNode));
                
                keys.forEach(key => {
                    if (key === '_diagrams') return;
                    
                    // Render folder name in bold with formatted name
                    const folderDiv = document.createElement('div');
                    folderDiv.style.paddingLeft = (depth * 16) + 'px';
                    folderDiv.style.fontWeight = 'bold';
                    folderDiv.style.color = '#333';
                    folderDiv.style.marginTop = depth > 0 ? '4px' : '8px';
                    folderDiv.style.fontSize = '13px';
                    folderDiv.textContent = formatFolderName(key);
                    paletteDropdown.appendChild(folderDiv);
                    const node = treeNode[key];

                    // Recursively render subfolders
                    renderTree(node, depth + 1);
                });
            }
            
            renderTree(tree);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeHtmlAttribute(text) {
            return String(text ?? '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }
        
        async function selectPaletteItem(diagram) {
            if (!canSwitchDiagram(diagram)) {
                return;
            }
            paletteDropdown.classList.remove('open');
            paletteInput.blur();
            state.navHistory = [];
            state.navFuture = [];
            // Palette selection is a fresh diagram selection; auto-fit once.
            state.applyFitOnLoad = diagram.type !== 'csv_only';
            applyDiagramSelection(diagram);
            updateMenuVisibility();
            updateLaneCheckboxes();
            savePersistedViewerState();
            await loadDiagram();
        }

        function updateLaneCheckboxes() {
            layersList.innerHTML = '';
            
            // Only show buttons if there are lanes/layers to select
            if (state.allLanes.length > 0) {

                const buttonContainer = document.createElement('div');

                clearAllBtn.addEventListener('click', () => {

        // Event handlers
        menuButton.addEventListener('click', () => {

        });
        showTestDiagramsToggle.addEventListener('change', onShowTestDiagramsChange);
        showIncludeCsvToggle.addEventListener('change', onShowIncludeCsvChange);
        showEditorToggle.addEventListener('change', () => {

        });
        fitButton.addEventListener('click', fitToView);
        resetButton.addEventListener('click', resetPanAndZoom);
        csvFormatButton.addEventListener('click', toggleCsvFormat);
        csvSaveButton.addEventListener('click', saveCsvEditorText);
        csvEditorTextarea.addEventListener('input', () => {
            const isDirty = csvEditorTextarea.value !== state.editorOriginalText;
            state.editorDirty = isDirty;
            if (isDirty) {
                setEditorStatus('Unsaved changes', 'unsaved');
            } else {
                setEditorStatus('Saved');
            }
            updateEditorSaveButtonState();
            highlightCsvSyntax(csvEditorTextarea.value);  // Update syntax highlighting
        });

        csvEditorTextarea.addEventListener('scroll', syncHighlightScroll);

        // Hover cross-linking: CSV row highlight diagram element
        csvEditorTextarea.addEventListener('mousemove', (e) => {
            const textarea = csvEditorTextarea;
            const rect = textarea.getBoundingClientRect();
            const padding = 10;  // textarea padding
            const lineHeight = parseInt(window.getComputedStyle(textarea).lineHeight);
            
            // Calculate which line is being hovered based on mouse Y position
            const y = e.clientY - rect.top + textarea.scrollTop - padding;
            const lineNumber = Math.floor(y / lineHeight);
            
            const lines = textarea.value.split('\n');
            if (lineNumber >= 0 && lineNumber < lines.length) {
                const currentLine = lines[lineNumber];
                
                // Skip empty lines and comment lines
                if (!currentLine.trim() || currentLine.trim().startsWith('#')) {
                    clearDiagramHighlight();
                    return;
                }
                
                // If it's an element definition line (Class;Name;...), highlight the element
                if (isElementDefinitionLine(currentLine)) {
                    const elementName = extractElementNameFromCsvLine(currentLine);
                    highlightDiagramElement(elementName);
                } 
                // If it's a connector line (Source;Target;Arrow;...), highlight BOTH endpoints
                else if (isConnectorLine(currentLine)) {
                    const connector = extractConnectorInfo(currentLine);
                    if (connector) {
                        // Highlight both source AND target elements
                        highlightDiagramElement(connector.source);
                        // For connectors, also highlight target (if different from source)
                        if (connector.target !== connector.source) {
                            highlightDiagramElement(connector.target, 'append');
                        }
                    }
                } 
                else {
                    clearDiagramHighlight();
                }
            }
        });

        csvEditorTextarea.addEventListener('mouseleave', () => {
            clearDiagramHighlight();
        });

        let editorResizeStartX = 0;
        let editorResizeStartWidth = 0;
        let isEditorResizing = false;

        csvResizer.addEventListener('mousedown', (event) => {
            if (!state.editorVisible) {
                return;
            }
            isEditorResizing = true;
            editorResizeStartX = event.clientX;
            editorResizeStartWidth = csvEditorPane.getBoundingClientRect().width;
            event.preventDefault();
        });

        document.addEventListener('mousemove', (event) => {
            if (!isEditorResizing) {
                return;
            }
            const delta = event.clientX - editorResizeStartX;
            const minWidth = 260;
            const maxWidth = Math.max(minWidth, Math.floor(window.innerWidth * 0.7));
            const nextWidth = Math.max(minWidth, Math.min(maxWidth, Math.floor(editorResizeStartWidth + delta)));
            state.editorPaneWidth = nextWidth;
            csvEditorPane.style.width = `${nextWidth}px`;
        });

        document.addEventListener('mouseup', () => {
            if (!isEditorResizing) {
                return;
            }
            isEditorResizing = false;
            savePersistedViewerState();
            requestAnimationFrame(() => fitToView());
        });

        // Match diagram zoom behavior: mouse wheel zoom inside editor pane.
        csvEditorTextarea.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            zoomEditorByStep(delta);
        }, { passive: false });
        
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#menu') && !e.target.closest('#menuButton')) {
                menu.classList.remove('active');
            }

            if (!e.target.closest('.class-link-menu') && !e.target.classList.contains('cls-linked-name')) {
                closeClassLinkMenu();
            }
        });
        
        // Add mouse wheel zoom handler
        diagramArea.addEventListener('wheel', (e) => {
            e.preventDefault();
            
            // Get current zoom level
            const delta = e.deltaY > 0 ? -0.1 : 0.1;  // Negative for scroll down (zoom out), positive for scroll up (zoom in)
            const newZoom = Math.max(0.5, Math.min(3.0, state.zoomLevel + delta));  // Clamp between 0.5x and 3x
            
            if (newZoom !== state.zoomLevel) {
                state.zoomLevel = newZoom;
                updateZoom();
            }
        }, { passive: false });
        
        function updateZoom() {
            const svg = diagramContainer.querySelector('svg');
            if (svg) {
                svg.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.zoomLevel})`;
                zoomIndicator.textContent = `${Math.round(state.zoomLevel * 100)}%`;
                zoomIndicator.style.display = state.zoomLevel !== 1.0 ? 'block' : 'none';
            }
        }
        
        // Add keyboard shortcuts for zoom
        document.addEventListener('keydown', (e) => {
            if (isEditorTextInputFocused()) {
                // When typing/editing text, keep key behavior local to the editor.
                if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
                    e.preventDefault();
                    saveCsvEditorText();
                    return;
                }
                return;
            }

            if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
                e.preventDefault();
                saveCsvEditorText();
                return;
            }

            // Ctrl+Plus or Ctrl+Up to zoom in
            if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '=' || e.code === 'Equal')) {
                e.preventDefault();
                state.zoomLevel = Math.min(3.0, state.zoomLevel + 0.1);
                updateZoom();
            }
            // Ctrl+Minus or Ctrl+Down to zoom out
            if ((e.ctrlKey || e.metaKey) && (e.key === '-' || e.code === 'Minus')) {
                e.preventDefault();
                state.zoomLevel = Math.max(0.5, state.zoomLevel - 0.1);
                updateZoom();
            }
            // Ctrl+0 to reset zoom
            if ((e.ctrlKey || e.metaKey) && (e.key === '0' || e.code === 'Digit0')) {
                e.preventDefault();
                state.zoomLevel = 1.0;
                updateZoom();
            }
            // Shift+F to fit diagram
            if ((e.shiftKey) && (e.key === 'F' || e.code === 'KeyF')) {
                e.preventDefault();
                fitToView();
            }
            // Shift+R to reset pan and zoom
            if ((e.shiftKey) && (e.key === 'R' || e.code === 'KeyR')) {
                e.preventDefault();
                resetPanAndZoom();
            }
            // Alt+Left / Alt+Right to navigate back/forward in diagram history
            if (e.altKey && e.key === 'ArrowLeft') {
                e.preventDefault();
                navigateBack();
                return;
            }
            if (e.altKey && e.key === 'ArrowRight') {
                e.preventDefault();
                navigateForward();
                return;
            }
            // Arrow keys for panning
            const panStep = 20;
            if (e.arrowUp || e.key === 'ArrowUp') {
                e.preventDefault();
                state.panY += panStep;
                updatePan();
            }
            if (e.arrowDown || e.key === 'ArrowDown') {
                e.preventDefault();
                state.panY -= panStep;
                updatePan();
            }
            if (e.arrowLeft || e.key === 'ArrowLeft') {
                e.preventDefault();
                state.panX += panStep;
                updatePan();
            }
            if (e.arrowRight || e.key === 'ArrowRight') {
                e.preventDefault();
                state.panX -= panStep;
                updatePan();
            }
        });

        function fitToView() {
            const svg = diagramContainer.querySelector('svg');
            if (!svg) return;
            
            const svgWidth = svg.getAttribute('width');
            const svgHeight = svg.getAttribute('height');
            
            if (!svgWidth || !svgHeight) return;

            const paneIsOpen =
                container.classList.contains('details-open') &&
                detailsPane.style.display !== 'none';
            
            // Calculate usable width: window - details pane (if open)
            // The diagram area width is what remains after CSV editor takes its space
            const detailsPaneWidth = paneIsOpen ? 0.20 * window.innerWidth : 0;
            const areaWidth = diagramArea.clientWidth - 40;
            const areaHeight = diagramArea.clientHeight - 40;
            
            const zoomX = areaWidth / parseFloat(svgWidth);
            const zoomY = areaHeight / parseFloat(svgHeight);
            
            state.zoomLevel = Math.min(zoomX, zoomY, 3.0);
            state.panX = 0;
            state.panY = 0;
            
            updateZoom();
            updatePan();
            
            // Scroll to top of diagram
            diagramArea.scrollTop = 0;
            diagramArea.scrollLeft = 0;
        }

        async function loadClassMetadata() {
            if (state.diagramType !== 'class_diagram' || !state.csv) {
                state.classMetadata = {};
                return;
            }

            try {
                const url = `/api/class_metadata?csv=${encodeURIComponent(state.csv)}&diagram_id=${encodeURIComponent(state.classDiagramId)}`;
                const response = await fetchWithTimeout(url, getMetadataLoadTimeoutMs());
                
                if (!response.ok) {
                    console.warn('Failed to load class metadata');
                    state.classMetadata = {};
                    return;
                }
                
                const data = await response.json();
                state.classMetadata = data.metadata || {};
            } catch (error) {
                console.warn('Error loading class metadata:', error);
                state.classMetadata = {};
            }
        }

        function getDiagramLoadTimeoutMs() {
            const csv = (state.csv || '').toLowerCase();
            const diagramId = (state.classDiagramId || '').toLowerCase();
            const routing = (state.routing || '').toLowerCase();

            // Default budget for normal diagrams.
            let timeoutMs = 45000;

            // Heavy test/advanced diagrams and stress probes can take longer.
            const likelyLargeCsv = csv.includes('/40_tests/') || csv.includes('/20_advanced/') || csv.includes('/test/tests/');
            const likelyStressDiagram = diagramId.includes('stress') || diagramId.includes('dense');
            const orthogonalClassDiagram = state.diagramType === 'class_diagram' && routing === 'orthogonal';

            if (likelyLargeCsv || likelyStressDiagram || orthogonalClassDiagram) {
                timeoutMs = 120000;
            }

            return timeoutMs;
        }

        function getMetadataLoadTimeoutMs() {
            // Metadata should be lighter than full SVG rendering, but keep
            // enough budget for large CSV parsing.
            return 30000;
        }

        async function fetchWithTimeout(url, timeoutMs) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            try {
                return await fetch(url, { signal: controller.signal });
            } finally {
                clearTimeout(timer);
            }
        }

        function showClassDetails(className) {
            const metadata = state.classMetadata[className] || {};
            const pane = document.getElementById('detailsPane');
            const content = document.getElementById('detailsPaneContent');
            const title = document.getElementById('detailsTitle');
            
            // Get linked diagrams for this class
            const linkedDiagrams = getLinkedDiagramsForClass(className);
            const currentDiagram = getCurrentDiagram();
            const relationships = getDiagramRelationships(currentDiagram);
            const parentKeys = new Set((relationships.parents || []).map(getDiagramKeyFor));
            const childKeys = new Set((relationships.children || []).map(getDiagramKeyFor));
            const parentLinkedDiagrams = [];
            const childLinkedDiagrams = [];
            const uncategorizedLinkedDiagrams = [];
            const traceability = metadata.traceability || {};
            const traceLinkTargets = [];

            const resolveTraceabilityTarget = (item) => {
                const itemId = String(item?.id || '').trim().toLowerCase();
                if (!itemId) {
                    return null;
                }

                // Prefer strict ID match; fallback to name match when IDs differ from UI labels.
                const exactMatch = state.allDiagrams.find(diagram =>
                    String(diagram.id || '').trim().toLowerCase() === itemId
                );
                if (exactMatch) {
                    return exactMatch;
                }

                return state.allDiagrams.find(diagram =>
                    String(diagram.name || '').trim().toLowerCase() === itemId
                ) || null;
            };

            const getTraceabilityTooltip = (item) => {
                const parts = [];
                const titleText = String(item?.title || '').trim();
                const sourceText = String(item?.source || '').trim();

                if (titleText) {
                    parts.push(titleText);
                }
                if (sourceText && sourceText !== 'explicit') {
                    parts.push(`Source: ${sourceText}`);
                }

                return parts.join('\n');
            };

            linkedDiagrams.forEach(diagram => {
                const diagramKey = getDiagramKeyFor(diagram);
                if (parentKeys.has(diagramKey)) {
                    parentLinkedDiagrams.push(diagram);
                } else if (childKeys.has(diagramKey)) {
                    childLinkedDiagrams.push(diagram);
                } else {
                    uncategorizedLinkedDiagrams.push(diagram);
                }
            });

            title.textContent = className;

            let html = '';
            
            // Section: Description
            if (metadata.description) {
                html += `<div class="details-section">
                    <div class="details-section-title">Description</div>
                    <div class="details-section-content">${escapeHtml(metadata.description)}</div>
                </div>`;
            }
            
            // Section: Responsibilities
            if (metadata.responsibilities && Array.isArray(metadata.responsibilities) && metadata.responsibilities.length > 0) {
                html += `<div class="details-section">
                    <div class="details-section-title">Responsibilities</div>
                    <div class="details-section-content">
                        <ul>${metadata.responsibilities.map(r => `<li>${escapeHtml(r)}</li>`).join('')}</ul>
                    </div>
                </div>`;
            }
            
            // Section: Notes
            if (metadata.notes && Array.isArray(metadata.notes) && metadata.notes.length > 0) {
                html += `<div class="details-section">
                    <div class="details-section-title">Notes</div>
                    <div class="details-section-content">
                        <ul>${metadata.notes.map(n => `<li>${escapeHtml(n)}</li>`).join('')}</ul>
                    </div>
                </div>`;
            }

            // Section: Linked Diagrams
            if (linkedDiagrams && linkedDiagrams.length > 0) {
                html += `<div class="details-section">
                    <div class="details-section-title">Diagrams</div>
                    <div class="details-section-content">
                        <div class="details-subsection-title">Parent</div>
                        ${parentLinkedDiagrams.length > 0
                            ? `<ul>${parentLinkedDiagrams.map((d, idx) => {
                                const typeLabel = d.type === 'sequence' ? 'SEQ' : 'CLS';
                                const itemId = `linked-diagram-parent-${idx}`;
                                return `<li><span id="${itemId}" class="details-link">${typeLabel}: ${escapeHtml(d.name)}</span></li>`;
                            }).join('')}</ul>`
                            : '<div class="details-empty">none</div>'}

                        <div class="details-subsection-title">Child</div>
                        ${childLinkedDiagrams.length > 0
                            ? `<ul>${childLinkedDiagrams.map((d, idx) => {
                                const typeLabel = d.type === 'sequence' ? 'SEQ' : 'CLS';
                                const itemId = `linked-diagram-child-${idx}`;
                                return `<li><span id="${itemId}" class="details-link">${typeLabel}: ${escapeHtml(d.name)}</span></li>`;
                            }).join('')}</ul>`
                            : '<div class="details-empty">none</div>'}

                        ${uncategorizedLinkedDiagrams.length > 0
                            ? `<div class="details-subsection-title">Related</div><ul>${uncategorizedLinkedDiagrams.map((d, idx) => {
                                const typeLabel = d.type === 'sequence' ? 'SEQ' : 'CLS';
                                const itemId = `linked-diagram-related-${idx}`;
                                return `<li><span id="${itemId}" class="details-link">${typeLabel}: ${escapeHtml(d.name)}</span></li>`;
                            }).join('')}</ul>`
                            : ''}
                    </div>
                </div>`;
            }

            // Section: Traceability (shown directly after Diagrams)
            const traceReqs = Array.isArray(traceability.requirements) ? traceability.requirements : [];
            const traceStories = Array.isArray(traceability.user_stories) ? traceability.user_stories : [];
            const traceTests = Array.isArray(traceability.test_cases) ? traceability.test_cases : [];
            const traceFeatures = Array.isArray(traceability.features) ? traceability.features : [];
            const hasTraceability = traceReqs.length || traceStories.length || traceTests.length || traceFeatures.length;
            if (hasTraceability) {
                const renderTraceList = (titleText, items, keyPrefix) => {
                    if (!items.length) {

                        <div class="details-subsection-title">${escapeHtml(titleText)}</div>

                                const tooltipText = getTraceabilityTooltip(item);
                                const tooltipAttr = tooltipText
                                    ? ` title="${escapeHtmlAttribute(tooltipText)}"`

                                if (targetDiagram) {

                                    traceLinkTargets.push({ id: linkId, diagram: targetDiagram });

                html += `<div class="details-section">

                    </div>
                </div>`;
            }
            
            if (!html) {
                html = '<div class="details-empty">No additional details available</div>';

            content.innerHTML = html;
            
            // Wire up linked diagram clicks
            parentLinkedDiagrams.forEach((diagram, idx) => {
                const elem = document.getElementById(`linked-diagram-parent-${idx}`);
                if (elem) {
                    elem.addEventListener('click', (e) => {

            childLinkedDiagrams.forEach((diagram, idx) => {

                if (elem) {
                    elem.addEventListener('click', (e) => {
                        e.preventDefault();
                        navigateToDiagram(diagram);

            uncategorizedLinkedDiagrams.forEach((diagram, idx) => {
                const elem = document.getElementById(`linked-diagram-related-${idx}`);
                if (elem) {
                    elem.addEventListener('click', (e) => {

        function setupClassDiagramHoverHighlight() {
            if (state.diagramType !== 'class_diagram') {
                return;
            }

            const svg = diagramContainer.querySelector('svg');
            if (!svg) {
                return;
            }

            const objectGroups = Array.from(svg.querySelectorAll('g.cls-object[data-class-name]'));
            const connectorGroups = Array.from(svg.querySelectorAll('g.cls-connector[data-source][data-target]'));

            if (!objectGroups.length || !connectorGroups.length) {
                return;
            }

            // Track current hovered element to avoid blinking on boundary crossings.
            // Only clear highlights when entering a different element.
            let currentHoveredElement = null;

            const clearHighlightIfDifferent = (newElement) => {
                if (currentHoveredElement !== newElement) {
                    clearClassDiagramHoverVisuals(svg);
                    clearCsvRowHighlight();
                }
            };

            objectGroups.forEach(obj => {
                obj.addEventListener('mouseenter', () => {
                    if (currentHoveredElement !== obj) {
                        clearHighlightIfDifferent(obj);
                        currentHoveredElement = obj;
                        const className = obj.getAttribute('data-class-name');
                        if (className) {
                            applyClassHoverVisuals(svg, className);
                            highlightCsvRow(className);
                        }
                    }
                });
                obj.addEventListener('mouseleave', () => {
                    if (currentHoveredElement === obj) {
                        currentHoveredElement = null;
                        clearClassDiagramHoverVisuals(svg);
                        clearCsvRowHighlight();
                    }
                });
            });

            connectorGroups.forEach(conn => {
                // Add invisible wide-stroke hit areas so narrow connectors are easier to hover.
                // stroke-opacity="0" is used (not stroke="transparent") so browsers register
                // the stroke as a valid pointer-events hit area.
                conn.querySelectorAll('path').forEach(visPath => {
                    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    hit.setAttribute('d', visPath.getAttribute('d'));
                    hit.setAttribute('fill', 'none');
                    hit.setAttribute('stroke', 'black');
                    hit.setAttribute('stroke-width', '12');
                    hit.setAttribute('stroke-opacity', '0');
                    hit.setAttribute('pointer-events', 'stroke');
                    conn.appendChild(hit);
                });

                conn.addEventListener('mouseenter', () => {
                    if (currentHoveredElement !== conn) {
                        clearHighlightIfDifferent(conn);
                        currentHoveredElement = conn;
                        applyConnectorHoverVisuals(svg, conn);
                        highlightCsvConnectorRow(
                            conn.getAttribute('data-source'),
                            conn.getAttribute('data-target')
                        );
                    }
                });
                conn.addEventListener('mouseleave', () => {
                    if (currentHoveredElement === conn) {
                        currentHoveredElement = null;
                        clearClassDiagramHoverVisuals(svg);
                        clearCsvRowHighlight();
                    }
                });
            });
        }

        function setupClassDiagramLinks() {
            if (state.diagramType !== 'class_diagram') {
                return;
            }

            const svg = diagramContainer.querySelector('svg');
            if (!svg) {
                return;
            }

            const objectGroups = Array.from(svg.querySelectorAll('g.cls-object[data-class-name]'));
            if (!objectGroups.length) {
                return;
            }

            objectGroups.forEach(obj => {
                const className = obj.getAttribute('data-class-name');
                if (!className) {
                    return;
                }

                // Find the title text (class name)
                const titleText = Array.from(obj.querySelectorAll('text')).find(node =>
                    node.getAttribute('font-weight') === 'bold'
                );
                if (!titleText) {
                    return;
                }

                // Make the title clickable for the details pane
                titleText.style.cursor = 'pointer';
                titleText.setAttribute('fill', '#1e6ba8');
                titleText.setAttribute('text-decoration', 'underline');

                titleText.addEventListener('mouseenter', () => {
                    titleText.style.opacity = '0.8';
                });
                titleText.addEventListener('mouseleave', () => {
                    titleText.style.opacity = '1';
                });

                // Click handler: show details pane
                titleText.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    showClassDetails(className);
                });
            });
        }
        
        async function loadDiagram() {
            if (state.isLoading) return;
            closeClassLinkMenu();
            if (!state.csv) {
                diagramContainer.innerHTML = '<div style="color: #999;">Loading...</div>';
                return;
            }

            if (!state.diagramType) {
                try {
                    await loadCsvEditorText();
                } catch (editorError) {
                    setEditorStatus(`Error: ${editorError.message}`, 'error');
                }
                diagramContainer.innerHTML = '<div style="color: #777; font-size: 15px;">No renderable diagram rows were found in this CSV. You can still edit and save the CSV in the editor.</div>';
                updateNavHistory();
                savePersistedViewerState();
                return;
            }
            
            // Check we have a valid diagram selection
            if (state.diagramType === 'sequence' && !state.sequence) {
                diagramContainer.innerHTML = '<div style="color: #999;">No sequence selected</div>';
                return;
            }
            if (state.diagramType === 'class_diagram' && !state.classDiagramId) {
                diagramContainer.innerHTML = '<div style="color: #999;">No class diagram selected</div>';
                return;
            }
            
            state.isLoading = true;
            diagramContainer.innerHTML = '<div style="color: #999;">Loading diagram...</div>';
            
            try {
                // Reset zoom when loading new diagram
                state.zoomLevel = 1.0;
                zoomIndicator.style.display = 'none';
                
                let url;
                if (state.diagramType === 'class_diagram') {
                    const lanesParam = state.selectedLanes.length > 0 ? state.selectedLanes.join(',') : '';
                    url = `/api/diagram?csv=${encodeURIComponent(state.csv)}&type=class_diagram&diagram_id=${encodeURIComponent(state.classDiagramId)}&verbosity=${encodeURIComponent(state.verbosity)}&routing=${encodeURIComponent(state.routing)}&lanes=${encodeURIComponent(lanesParam)}`;
                } else {
                    const lanesParam = state.selectedLanes.length > 0 ? state.selectedLanes.join(',') : '';
                    url = `/api/diagram?csv=${encodeURIComponent(state.csv)}&type=sequence&sequence=${encodeURIComponent(state.sequence)}&verbosity=${encodeURIComponent(state.verbosity)}&lanes=${encodeURIComponent(lanesParam)}`;
                }
                
                const timeoutMs = getDiagramLoadTimeoutMs();
                const response = await fetchWithTimeout(url, timeoutMs);
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Unknown error');
                }
                
                const svgText = await response.text();
                diagramContainer.innerHTML = svgText;
                
                // No version update needed - Build version is set once at page load
                
                // Apply zoom to the newly loaded SVG
                updateZoom();

                // Auto-fit when a diagram is selected for the first time.
                // Back/Forward navigation leaves zoom/pan as-is.
                // Defer into a double-rAF so the browser has completed layout
                // for the newly injected SVG before fitToView reads clientWidth.
                if (state.applyFitOnLoad) {
                    state.applyFitOnLoad = false;
                    requestAnimationFrame(() => requestAnimationFrame(() => fitToView()));
                }

                // Wire class-diagram object hover highlighting for connectors/text.
                setupClassDiagramHoverHighlight();
                setupClassDiagramLinks();
                
                // Wire diagram→CSV cross-linking on hover
                setupDiagramHoverCsvCrosslinking();
                
                // Load class metadata for details pane
                await loadClassMetadata();

                // Load source CSV text for the editor pane after successful render.
                try {
                    await loadCsvEditorText();
                } catch (editorError) {
                    setEditorStatus(`Error: ${editorError.message}`, 'error');
                }
                
                updateNavHistory();

                // Persist successfully loaded state snapshot.
                savePersistedViewerState();
            } catch (error) {
                if (error && error.name === 'AbortError') {
                    diagramContainer.innerHTML = `<div class="error">Error loading diagram: request timed out while waiting for the server response.</div>`;
                } else {
                    diagramContainer.innerHTML = `<div class="error">Error loading diagram: ${error.message}</div>`;
                }
            } finally {
                state.isLoading = false;
            }
        }
        
            // Start
            init();
        }); // End DOMContentLoaded
    </script>
</body>
</html>
